name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

# Si se re-empuja el mismo tag, cancela el run anterior en vez de solaparse.
concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-14
            target: aarch64-apple-darwin
          - runner: macos-13
            target: x86_64-apple-darwin
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      # Construye la app (frontend + Tauri) y publica el .dmg en la release del tag.
      - name: Build app and publish release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: --target ${{ matrix.target }}
          tagName: ${{ github.ref_name }}
          releaseName: "ghss ${{ github.ref_name }}"
          releaseDraft: false
          prerelease: false

      # Empaqueta el binario suelto como tar.gz (convención del tap, estilo cargo-dist).
      - name: Package binary tarball
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          BINDIR="src-tauri/target/${{ matrix.target }}/release"
          TARBALL="ghss_${VERSION}_${{ matrix.target }}.tar.gz"
          tar -czf "$TARBALL" -C "$BINDIR" ghss
          echo "Created $TARBALL"

      - name: Upload tarball to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          gh release upload "${GITHUB_REF_NAME}" "ghss_${VERSION}_${{ matrix.target }}.tar.gz" --clobber

  # Linux: publica .deb y .AppImage en la release.
  build-linux:
    permissions:
      contents: write
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - uses: dtolnay/rust-toolchain@stable

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libgtk-3-dev \
            libayatana-appindicator3-dev librsvg2-dev patchelf

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Build app and publish release (.deb / .AppImage)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "ghss ${{ github.ref_name }}"
          releaseDraft: false
          prerelease: false

  # Actualiza Formula/ghss.rb en theburrowhub/homebrew-tap tras publicar la release.
  # Usa el secret TAP_GITHUB_TOKEN (convención de la org: fang, go-secret…).
  homebrew:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Generate and push formula
        continue-on-error: true
        env:
          TAP_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}
          GH_REF: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          if [ -z "${TAP_TOKEN}" ]; then
            echo "TAP_GITHUB_TOKEN no configurado — se omite la actualización del tap."
            exit 0
          fi
          VERSION="${GH_REF#v}"
          BASE="https://github.com/theburrowhub/ghss/releases/download/${GH_REF}"
          ARM_URL="${BASE}/ghss_${VERSION}_aarch64-apple-darwin.tar.gz"
          INTEL_URL="${BASE}/ghss_${VERSION}_x86_64-apple-darwin.tar.gz"
          SHA_ARM=$(curl -sL "$ARM_URL" | sha256sum | cut -d' ' -f1)
          SHA_INTEL=$(curl -sL "$INTEL_URL" | sha256sum | cut -d' ' -f1)
          if [ "$SHA_ARM" = "$SHA_INTEL" ]; then
            echo "Checksums idénticos: probablemente las descargas fallaron (404)."; exit 1
          fi

          git clone "https://x-access-token:${TAP_TOKEN}@github.com/theburrowhub/homebrew-tap" tap
          cat > tap/Formula/ghss.rb <<EOF
          # typed: false
          # frozen_string_literal: true

          class Ghss < Formula
            desc "Audita y sincroniza la configuracion de repos de GitHub"
            homepage "https://theburrowhub.github.io/ghss"
            version "${VERSION}"
            license "MIT"

            on_macos do
              on_arm do
                url "${ARM_URL}"
                sha256 "${SHA_ARM}"
              end
              on_intel do
                url "${INTEL_URL}"
                sha256 "${SHA_INTEL}"
              end
            end

            def install
              bin.install "ghss"
            end

            test do
              assert_match version.to_s, shell_output("#{bin}/ghss --version")
            end
          end
          EOF

          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/ghss.rb
          git commit -m "chore(ghss): update to v${VERSION}" || { echo "Sin cambios"; exit 0; }
          git push
